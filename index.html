<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2b3e4c">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DGIyCD – Planilla de Asistencia</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --v:#2b3e4c;--v2:#3a5468;--lima:#87b867;--lima-c:#e8f4d8;
  --bl:#fcf2dc;--bg:#f4dfb9;--borde:#e0ceaa;--gt:#4a5e6e;--t:#2b3e4c;
  --az:#2b3e4c;--az-c:#e8f0f6;--s:0 2px 10px rgba(43,62,76,.12);--r:10px;
  --beige1:#fcf2dc;--beige2:#f4dfb9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--beige2);color:var(--t);min-height:100vh;padding-bottom:76px}

/* HEADER */
header{background:var(--v);color:var(--beige1);padding:12px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(43,62,76,.3);display:flex;align-items:center;gap:12px}
.hlogo{width:38px;height:38px;flex-shrink:0;background:var(--beige1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;font-style:normal;color:var(--v);letter-spacing:-1px;font-family:'Manrope',sans-serif}
.htext .org{font-size:9px;letter-spacing:.09em;text-transform:uppercase;opacity:.65;margin-bottom:1px;color:var(--beige2)}
.htext h1{font-size:14px;font-weight:700;color:var(--beige1)}
.hmes{margin-left:auto;background:var(--lima);color:var(--v);font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--beige1);border-top:1.5px solid var(--borde);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 10px rgba(43,62,76,.10)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 7px;border:none;background:none;color:var(--gt);font-size:10px;font-weight:600;cursor:pointer;gap:3px;transition:color .15s;font-family:inherit}
.bn svg{width:22px;height:22px;stroke-width:2}
.bn.active,.bn.active svg{color:var(--v);stroke:var(--v)}

/* VIEWS */
.view{display:none;padding:14px}.view.active{display:block}

/* CARDS */
.card{background:var(--beige1);border-radius:var(--r);box-shadow:var(--s);padding:16px;margin-bottom:14px}
.ctitle{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--v2);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.ctitle::before{content:'';display:block;width:3px;height:14px;background:var(--lima);border-radius:2px}

/* FORM */
label{display:block;font-size:11px;font-weight:700;color:var(--gt);margin-bottom:4px;margin-top:12px;text-transform:uppercase;letter-spacing:.04em}
label:first-child{margin-top:0}
input,select,textarea{width:100%;padding:11px 13px;font-size:15px;border:1.5px solid var(--borde);border-radius:8px;background:var(--beige1);color:var(--t);font-family:'Manrope',inherit;appearance:none;-webkit-appearance:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--v2)}
textarea{resize:vertical;min-height:64px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* SEARCH INPUT */
.search-wrap{position:relative;margin-bottom:8px}
.search-wrap input{padding-left:36px}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gt);pointer-events:none}

/* DROPDOWN */
.dropdown{position:relative}
.drop-list{display:none;position:absolute;z-index:50;left:0;right:0;top:100%;background:var(--beige1);border:1.5px solid var(--v2);border-radius:8px;max-height:220px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.drop-list.open{display:block}
.drop-item{padding:11px 13px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--borde)}
.drop-item:last-child{border:none}
.drop-item:hover,.drop-item.focused{background:var(--beige2)}
.drop-item .di-sub{font-size:11px;color:var(--gt);margin-top:2px}

/* FILTROS CHIP */
.filtros{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filtros::-webkit-scrollbar{display:none}
.fbtn{padding:7px 14px;border:1.5px solid var(--borde);background:var(--beige1);color:var(--gt);border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0}
.fbtn.fa{border-color:var(--v);color:var(--v);background:var(--beige2)}

/* ACCIONES MULTI-SELECT */
.acciones-grid{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.acc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--borde);border-radius:8px;cursor:pointer;transition:all .15s}
.acc-item.tec-sel{border-color:var(--az);background:var(--az-c)}
.acc-item.ped-sel{border-color:var(--v);background:var(--lima-c)}
.acc-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--borde);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.acc-item.tec-sel .acc-check{background:var(--az);border-color:var(--az)}
.acc-item.ped-sel .acc-check{background:var(--v);border-color:var(--v)}
.acc-check svg{width:12px;height:12px;stroke:#fff;display:none}
.acc-item.tec-sel .acc-check svg,.acc-item.ped-sel .acc-check svg{display:block}
.acc-label{font-size:14px;font-weight:600}
.acc-cat{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.tec-tag{color:var(--az)}.ped-tag{color:var(--v)}

/* ACTIVITY CARDS */
/* SWIPE TO DELETE */
.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--r);margin-bottom:10px}
.swipe-bg{position:absolute;inset:0;background:#dc2626;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;border-radius:var(--r)}
.swipe-bg span{color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;gap:6px}
.act-card{background:var(--beige1);box-shadow:var(--s);padding:14px;border-left:4px solid var(--borde);position:relative;transform:translateX(0);transition:transform .2s ease;touch-action:pan-y;will-change:transform;border-radius:var(--r)}
.act-card.tec{border-left-color:var(--az)}.act-card.ped{border-left-color:var(--lima)}.act-card.both{border-left-color:var(--v)}
.act-card.removing{transform:translateX(-110%)!important;transition:transform .25s ease;opacity:0}
.act-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.act-fecha{font-size:13px;font-weight:800}
.badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:20px}
.badge-tec{background:var(--az-c);color:var(--az)}.badge-ped{background:var(--lima-c);color:var(--v)}
.act-meta{font-size:12px;color:var(--gt);margin-bottom:4px}
.act-inst{font-size:14px;font-weight:700;color:var(--t);margin-bottom:4px}
.act-acciones{font-size:13px;color:var(--t);line-height:1.5}
.act-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
.btn-del{padding:7px 12px;background:#fee2e2;color:#b91c1c;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;display:none}
.btn-sm{padding:7px 14px;border:1.5px solid var(--borde);background:var(--beige2);color:var(--t);border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* BTNS */
.btn-p{width:100%;padding:14px;background:var(--v);color:var(--beige1);border:none;border-radius:var(--r);font-size:15px;font-weight:800;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;transition:background .15s}
.btn-p:active{background:var(--v2)}
.btn-lima{background:var(--lima)!important;color:var(--v)!important}
.btn-lima:active{background:#6aad35!important}

/* PLANILLA */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--beige1);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--s)}
.stat-n{font-size:32px;font-weight:900;line-height:1}
.stat-l{font-size:10px;text-transform:uppercase;color:var(--gt);margin-top:3px;letter-spacing:.05em}
.stat.tec .stat-n{color:var(--az)}.stat.ped .stat-n{color:var(--v)}
.sem-lbl{font-size:11px;font-weight:800;text-transform:uppercase;color:var(--v);letter-spacing:.07em;margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.sem-lbl::before{content:'';display:block;width:16px;height:2px;background:var(--lima)}
.dia-card{background:var(--beige1);border-radius:var(--r);box-shadow:var(--s);margin-bottom:8px;overflow:hidden}
.dia-head{background:var(--v);color:var(--beige1);padding:8px 14px;font-size:13px;font-weight:800;display:flex;justify-content:space-between}
.dia-body{padding:10px 14px}
.dia-empty{font-size:13px;color:var(--gt);font-style:italic}
.dia-act{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--borde)}
.dia-act:last-child{margin:0;padding:0;border:none}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:var(--beige1);border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-height:92vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;color:var(--v);margin-bottom:14px}
.modal-btns{display:flex;gap:10px;margin-top:12px}
.modal-btns .btn-p{flex:1;margin-top:0}

/* ESCUELA SELECTED */
.esc-sel-box{background:var(--beige2);border:1.5px solid var(--lima);border-radius:8px;padding:10px 13px;margin-top:6px;display:none}
.esc-sel-box.show{display:block}
.esc-sel-nom{font-size:14px;font-weight:700;color:var(--v)}
.esc-sel-loc{font-size:12px;color:var(--gt);margin-top:2px}
.esc-clear{float:right;background:none;border:none;color:var(--gt);font-size:18px;cursor:pointer;line-height:1;padding:0}

/* CATEGORÍA SECTION */
.cat-section{border:1.5px solid var(--borde);border-radius:8px;margin-top:6px;overflow:hidden}
.cat-sec-hdr{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;user-select:none}
.cat-sec-hdr input[type=checkbox]{width:18px;height:18px;accent-color:var(--v);flex-shrink:0;cursor:pointer}
.cat-sec-hdr span{font-size:14px;font-weight:700}
.cat-sec-body{display:none;padding:0 13px 12px;border-top:1px solid var(--borde);background:var(--beige2)}
.cat-sec-body.open{display:block}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--gt)}
.empty-icon{font-size:48px;margin-bottom:10px}

/* TOAST */
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--v);color:var(--beige1);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all .25s;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SINÓNIMO input hidden visible */
#f-inst-id{display:none}
</style>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .catch(e => console.log('SW error:', e));
  });
}
</script>
</head>
<body>

<header>
  <div class="hlogo" style="font-size:13px;letter-spacing:-0.5px;font-weight:900;font-family:Manrope,sans-serif">NQN</div>
  <div class="htext">
    <div class="org">Ministerio de Educación del Neuquén · DGIyCD</div>
    <h1>Planilla de Asistencia</h1>
  </div>
  <span class="hmes" id="hmes">Mayo 2026</span>
</header>

<!-- ══════════════ NUEVA ══════════════ -->
<div id="view-nueva" class="view active">
<div class="card">
  <div class="ctitle">Nueva Actividad</div>

  <label>Fecha</label>
  <input type="date" id="f-fecha">

  <label>Modalidad</label>
  <select id="f-mod">
    <option value="Territorio">Territorio</option>
    <option value="Virtual">Virtual</option>
    <option value="Sede">Sede / Oficina</option>
    <option value="Licencia">Licencia</option>
  </select>

  <!-- Institución con buscador -->
  <div id="inst-section">
    <label>Institución / Establecimiento</label>
    <div style="display:flex;gap:8px;margin-bottom:4px">
      <select id="f-filtro-dist" style="flex:0 0 auto;width:auto;font-size:13px;padding:8px 10px">
        <option value="">Todos</option>
        <option value="14">Distrito 14</option>
        <option value="5">Distrito 5</option>
      </select>
    </div>
    <div class="dropdown">
      <div class="search-wrap">
        <svg class="search-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="f-inst-search" placeholder="Buscar establecimiento…" autocomplete="off">
      </div>
      <div class="drop-list" id="drop-inst"></div>
    </div>
    <input type="hidden" id="f-inst-id">
    <div class="esc-sel-box" id="esc-sel">
      <button class="esc-clear" onclick="clearEsc()">✕</button>
      <div class="esc-sel-nom" id="esc-nom"></div>
      <div class="esc-sel-loc" id="esc-loc"></div>
    </div>
    <div style="margin-top:8px">
      <input type="text" id="f-inst-libre" placeholder="O escribir manualmente…" style="font-size:13px;padding:9px 12px">
    </div>
  </div>

  <div class="row2" style="margin-top:12px">
    <div><label>Hs. Entrada</label><input type="time" id="f-ent"></div>
    <div><label>Hs. Salida</label><input type="time" id="f-sal"></div>
  </div>

  <!-- Categorías con acciones -->
  <label style="margin-top:14px">Acciones realizadas</label>

  <div class="cat-section" id="sec-tec" style="margin-bottom:8px">
    <div class="cat-sec-hdr" onclick="toggleCat('tec')">
      <input type="checkbox" id="chk-tec" onclick="event.stopPropagation();toggleCat('tec',this.checked)">
      <span>⚙️ Técnica</span>
    </div>
    <div class="cat-sec-body" id="body-tec">
      <div class="acciones-grid" id="acc-tec"></div>
    </div>
  </div>

  <div class="cat-section" id="sec-ped">
    <div class="cat-sec-hdr" onclick="toggleCat('ped')">
      <input type="checkbox" id="chk-ped" onclick="event.stopPropagation();toggleCat('ped',this.checked)">
      <span>📚 Pedagógica</span>
    </div>
    <div class="cat-sec-body" id="body-ped">
      <div class="acciones-grid" id="acc-ped"></div>
    </div>
  </div>

  <label style="margin-top:14px">Observaciones</label>
  <textarea id="f-obs" placeholder="Notas adicionales (opcional)"></textarea>

  <button class="btn-p" onclick="guardar()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    Guardar actividad
  </button>
</div>
</div>

<!-- ══════════════ LISTA ══════════════ -->
<div id="view-lista" class="view">
  <div class="filtros">
    <button class="fbtn fa" id="f-todos" onclick="filtrar('todos')">Todas</button>
    <button class="fbtn" id="f-tec" onclick="filtrar('tec')">⚙️ Técnica</button>
    <button class="fbtn" id="f-ped" onclick="filtrar('ped')">📚 Pedagógica</button>
  </div>
  <div id="lista-cnt"></div>
</div>

<!-- ══════════════ PLANILLA ══════════════ -->
<div id="view-planilla" class="view">
  <div class="card">
    <div class="ctitle">Datos del Empleado</div>
    <label>Nombre y Apellido</label>
    <input type="text" id="p-nombre" placeholder="Nombre completo">
    <label>N° de Empleado</label>
    <input type="text" id="p-leg" placeholder="Ej: 515459">
    <div class="row2">
      <div>
        <label>Mes</label>
        <select id="p-mes">
          <option>Enero</option><option>Febrero</option><option>Marzo</option>
          <option>Abril</option><option selected>Mayo</option><option>Junio</option>
          <option>Julio</option><option>Agosto</option><option>Septiembre</option>
          <option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
        </select>
      </div>
      <div>
        <label>Año</label>
        <input type="text" id="p-anio" value="2026">
      </div>
    </div>
    <button class="btn-p btn-lima" onclick="guardarPerfil()" style="margin-top:12px">Guardar datos</button>
  </div>

  <div class="card">
    <div class="ctitle">Envío por Mail</div>
    <label>Email destinatario</label>
    <input type="email" id="p-email" placeholder="supervisor@educacion.nqn.gov.ar">
    <label>Email en copia (CC)</label>
    <input type="email" id="p-emailcc" placeholder="Opcional">
    <button class="btn-p btn-lima" onclick="guardarPerfil()" style="margin-top:12px">Guardar emails</button>
    <button class="btn-p" onclick="enviarMail()" style="margin-top:8px;background:#2b3e4c">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
      Enviar Planilla por Mail
    </button>
  </div>

  <div id="stats-cnt"></div>
  <div id="plan-cnt"></div>

  <div class="card">
    <div class="ctitle">Exportar y Compartir</div>

    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn-p" onclick="exportCSV()" style="flex:1;margin:0;font-size:13px;padding:11px 8px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Excel (.csv)
      </button>
      <button class="btn-p" onclick="compartir('csv')" style="flex:0 0 48px;margin:0;padding:11px 8px;background:#87b867">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn-p btn-lima" onclick="exportDOCX()" style="flex:1;margin:0;font-size:13px;padding:11px 8px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Word (.docx)
      </button>
      <button class="btn-p" onclick="compartir('docx')" style="flex:0 0 48px;margin:0;padding:11px 8px;background:#87b867">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
    </div>

    <div style="display:flex;gap:8px">
      <button class="btn-p" onclick="exportPDF()" style="flex:1;margin:0;font-size:13px;padding:11px 8px;background:#8b1a1a">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        PDF
      </button>
      <button class="btn-p" onclick="compartir('pdf')" style="flex:0 0 48px;margin:0;padding:11px 8px;background:#87b867">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
    </div>

    <div style="font-size:11px;color:var(--gt);margin-top:10px;text-align:center">

function isoHoy(){ return new Date().toISOString().split('T')[0]; }

// ── ACCIONES BUILD ────────────────────────────────────────────────────────────
function buildAcciones(containerId, lista, tipo, setRef, isEdit=false){
  const c = document.getElementById(containerId);
  c.innerHTML = lista.map(a => `
    <div class="acc-item" id="${isEdit?'e':'f'}-${tipo}-${a.replace(/[^a-z]/gi,'')}" onclick="toggleAcc('${a}','${tipo}',${isEdit})">
      <div class="acc-check"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div>
        <div class="acc-cat ${tipo}-tag">${tipo==='tec'?'⚙️ Técnica':'📚 Pedagógica'}</div>
        <div class="acc-label">${a}</div>
      </div>
    </div>`).join('');
}

function toggleAcc(accion, tipo, isEdit=false){
  const setRef = isEdit ? (tipo==='tec'?eSelTec:eSelPed) : (tipo==='tec'?selTec:selPed);
  if(setRef.has(accion)) setRef.delete(accion); else setRef.add(accion);
  const prefix = isEdit ? 'e' : 'f';
  const key = `${prefix}-${tipo}-${accion.replace(/[^a-z]/gi,'')}`;
  const el = document.getElementById(key);
  if(el){
    el.classList.toggle(`${tipo}-sel`, setRef.has(accion));
  }
  if(!isEdit) updateCatChecks();
}

function updateCatChecks(){
  document.getElementById('chk-tec').checked = selTec.size > 0;
  document.getElementById('chk-ped').checked = selPed.size > 0;
}

function toggleCat(tipo, forceOpen){
  const body = document.getElementById('body-'+tipo);
  const chk = document.getElementById('chk-'+tipo);
  const isOpen = body.classList.contains('open');
  const shouldOpen = forceOpen !== undefined ? forceOpen : !isOpen;
  body.classList.toggle('open', shouldOpen);
  chk.checked = shouldOpen;
}

    if(d) list = list.filter(e => e.distrito == d);
    if(q) list = list.filter(e => e.nombre.toLowerCase().includes(q) || e.localidad.toLowerCase().includes(q));
    list = list.slice(0,30);
    if(!list.length || !q){ drop.classList.remove('open'); return; }
    drop.innerHTML = list.map((e,i) => `
      <div class="drop-item" onclick="selEscuela(${ESCUELAS.indexOf(e)})">
        ${e.nombre}
        <div class="di-sub">${e.localidad}</div>
      </div>`).join('');
    drop.classList.add('open');
  }

  input.addEventListener('input', render);
  distFiltro.addEventListener('change', render);
  document.addEventListener('click', e => { if(!e.target.closest('.dropdown')&&!e.target.closest('#f-filtro-dist')) drop.classList.remove('open'); });
}

function filtrar(f){

  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('fa'));
  document.getElementById('f-'+f).classList.add('fa');

function renderLista(){
  const cnt=document.getElementById('lista-cnt');
  let data=[...acts].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if(filtro==='tec') data=data.filter(a=>a.tec&&a.tec.length);
  if(filtro==='ped') data=data.filter(a=>a.ped&&a.ped.length);
  if(!data.length){
    cnt.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>No hay actividades${filtro!=='todos'?' de esta categoría':''}.<br>Usá <strong>Nueva</strong> para agregar.</p></div>`;
    return;
  }
  cnt.innerHTML=data.map(a=>{
    const hasTec=a.tec&&a.tec.length, hasPed=a.ped&&a.ped.length;
    const cls=hasTec&&hasPed?'both':hasTec?'tec':'ped';
    const horas=(a.ent||a.sal)?a.ent+' → '+a.sal:'';
    const accStr=[...(a.tec||[]).map(x=>'⚙️ '+x),...(a.ped||[]).map(x=>'📚 '+x)].join('<br>');
    return `<div class="swipe-wrap" id="wrap-${a.id}">
      <div class="swipe-bg"><span>🗑 Eliminar</span></div>
      <div class="act-card ${cls}" data-id="${a.id}">
        <div class="act-head">
          <div class="act-fecha">${fmtFecha(a.fecha)}</div>
          <div class="badges">
            ${hasTec?'<span class="badge badge-tec">⚙️ Técnica</span>':''}
            ${hasPed?'<span class="badge badge-ped">📚 Pedagógica</span>':''}
          </div>
        </div>
        <div class="act-meta">${a.mod}${horas?' · '+horas:''}</div>
        ${a.inst?`<div class="act-inst">🏫 ${a.inst}</div>`:''}
        <div class="act-acciones">${accStr}</div>
        ${a.obs?`<div style="font-size:12px;color:var(--gt);margin-top:4px">${a.obs}</div>`:''}
        <div class="act-btns">
          <button class="btn-sm" onclick="abrirEdit(${a.id})">Editar</button>
        </div>
      </div>
    </div>`;
  }).join('');
  requestAnimationFrame(initSwipe);
}

function fmtFecha(s){
  const ds=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],ms=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const d=new Date(s+'T12:00:00');
  return ds[d.getDay()]+' '+d.getDate()+' '+ms[d.getMonth()];
}

function eliminar(id){
  const wrap = document.getElementById('wrap-'+id);
  if(wrap){ wrap.querySelector('.act-card').classList.add('removing'); setTimeout(()=>{ acts=acts.filter(a=>a.id!==id);save();renderLista(); },260); }
  else { acts=acts.filter(a=>a.id!==id);save();renderLista(); }
}

// ── SWIPE TO DELETE ───────────────────────────────────────────────────────────
function initSwipe(){
  document.querySelectorAll('.act-card[data-id]').forEach(card=>{
    let startX=0,startY=0,curX=0,swiping=false,decided=false,isH=false;
    const id=parseInt(card.dataset.id);
    card.addEventListener('touchstart',e=>{
      startX=e.touches[0].clientX;startY=e.touches[0].clientY;
      curX=0;swiping=true;decided=false;isH=false;
      card.style.transition='none';
    },{passive:true});
    card.addEventListener('touchmove',e=>{
      if(!swiping)return;
      const dx=e.touches[0].clientX-startX;
      const dy=e.touches[0].clientY-startY;
      if(!decided){decided=true;isH=Math.abs(dx)>Math.abs(dy);}
      if(!isH)return;
      curX=Math.min(0,dx);
      card.style.transform=`translateX(${curX}px)`;
    },{passive:true});
    card.addEventListener('touchend',()=>{
      if(!swiping)return;swiping=false;
      card.style.transition='transform .2s ease';
      if(curX<-80){ eliminar(id); }
      else{ card.style.transform='translateX(0)'; }
    });
  });
}

function renderStats(){

  document.getElementById('stats-cnt').innerHTML=`
    <div class="stats">

      <div class="stat ped"><div class="stat-n">${nped}</div><div class="stat-l">📚 Pedagógicas</div></div>
    </div>`;

function renderPlanilla(){
  const cnt=document.getElementById('plan-cnt');
  if(!acts.length){cnt.innerHTML='<div class="empty"><div class="empty-icon">📅</div><p>Agregá actividades para ver la planilla.</p></div>';return;}
  const byF={};
  acts.forEach(a=>{if(!byF[a.fecha])byF[a.fecha]=[];byF[a.fecha].push(a);});
  const sems=getSemanas(byF);
  let html='';
  sems.forEach((sem,i)=>{
    html+=`<div class="sem-lbl">Semana ${i+1}</div>`;
    sem.forEach(({date,key})=>{
      const list=byF[key]||[];
      const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
      const head=dias[date.getDay()]+' '+date.getDate();
      const a0=list[0];
      const horas=a0&&(a0.ent||a0.sal)?(a0.ent||'—')+' / '+(a0.sal||'—'):'';
      html+=`<div class="dia-card">
        <div class="dia-head"><span>${head}</span><span style="font-size:11px;opacity:.75">${horas}</span></div>
        <div class="dia-body">${list.length?list.map(a=>{
          const tecStr=(a.tec||[]).map(x=>`<span style="color:var(--az)">⚙️ ${x}</span>`).join(', ');
          const pedStr=(a.ped||[]).map(x=>`<span style="color:var(--v)">📚 ${x}</span>`).join(', ');
          return `<div class="dia-act">
            <div style="font-size:11px;font-weight:800;color:var(--gt);text-transform:uppercase">${a.mod}</div>
            ${a.inst?`<div style="font-size:13px;font-weight:700">${a.inst}</div>`:''}
            <div style="font-size:13px;line-height:1.6">${[tecStr,pedStr].filter(Boolean).join(' · ')}</div>
            ${a.obs?`<div style="font-size:11px;color:var(--gt)">${a.obs}</div>`:''}
          </div>`;
        }).join(''):'<div class="dia-empty">Sin actividad</div>'}</div>
      </div>`;
    });
  });
  cnt.innerHTML=html;
}

function getSemanas(byF){
  const fechas=Object.keys(byF).sort();
  const sems={};
  fechas.forEach(f=>{
    const d=new Date(f+'T12:00:00');
    const lu=new Date(d);lu.setDate(d.getDate()-((d.getDay()+6)%7));
    const key=lu.toISOString().split('T')[0];
    if(!sems[key]){sems[key]={lunes:lu,dias:[]};}
    sems[key].dias.push({date:d,key:f});
  });
  return Object.values(sems).sort((a,b)=>a.lunes-b.lunes).map(s=>s.dias);
}

function exportCSV(){
  if(!acts.length){toast('No hay actividades');return;}

    ['Planilla de Asistencia '+perfil.anio+' - MES: '+perfil.mes.toUpperCase()],

    ['Fecha','Día','Modalidad','Institución','Hs.Entrada','Hs.Salida','Acciones Técnicas','Acciones Pedagógicas','Observaciones']
  ];
  [...acts].sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(a=>{
    rows.push([a.fecha,fmtFecha(a.fecha),a.mod,a.inst||'',(a.tec||[]).join(' | '),(a.ped||[]).join(' | '),a.obs||'']);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  dl('\uFEFF'+csv,'text/csv','planilla_'+perfil.mes.toLowerCase()+'_'+perfil.anio+'.csv');

// ── EXPORT DOCX ───────────────────────────────────────────────────────────────
async function exportDOCX(){
  if(!acts.length){toast('No hay actividades');return;}
  if(typeof docx==='undefined'){toast('Cargando librería…');return;}
  toast('Generando planilla Word…');
  const {Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,AlignmentType,WidthType,BorderStyle,ShadingType,VerticalAlign}=docx;
  const VERDE='1E4D3B',GRIS='D9D9D9';
  function brd(c='000000',s=4){return{style:BorderStyle.SINGLE,size:s,color:c};}
  const B={top:brd(),bottom:brd(),left:brd(),right:brd()};
  const WN=2200,WL=1200,WH=562,WD=WH*2,TOTAL=WN+WL+WD*5;
  const DIAS=['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];

  function hc(txt,w,bg=VERDE,fg='FFFFFF'){
    return new TableCell({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:txt,bold:true,color:fg,font:'Arial',size:16})]})],shading:{fill:bg,type:ShadingType.CLEAR},borders:B,verticalAlign:VerticalAlign.CENTER,margins:{top:60,bottom:60,left:60,right:60},width:{size:w,type:WidthType.DXA}});
  }
  function tc(txt,w){
    return new TableCell({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:String(txt||''),font:'Arial',size:18})]})],borders:B,verticalAlign:VerticalAlign.CENTER,margins:{top:60,bottom:60,left:80,right:80},width:{size:w,type:WidthType.DXA}});
  }

  const byF={};
  acts.forEach(a=>{if(!byF[a.fecha])byF[a.fecha]=[];byF[a.fecha].push(a);});
  const sems=getSemanas(byF);

  const children=[
    new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:80},children:[new TextRun({text:'Ministerio de Educación del Neuquén: Dirección General de Innovación y Contenidos Digitales.',bold:true,font:'Arial',size:22})]}),
    new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:200},children:[new TextRun({text:'Planilla de Asistencia '+perfil.anio+' - MES: '+perfil.mes.toUpperCase(),bold:true,font:'Arial',size:22})]}),
  ];

  sems.forEach((sem,si)=>{
    if(si>0) children.push(new Paragraph({spacing:{before:300},children:[]}));
    const lu=new Date(sem[0].date);
    lu.setDate(sem[0].date.getDate()-((sem[0].date.getDay()+6)%7));
    const dias5=[];
    for(let i=0;i<5;i++){const d=new Date(lu);d.setDate(lu.getDate()+i);const k=d.toISOString().split('T')[0];dias5.push({date:d,key:k,actos:byF[k]||[]});}

    const f1=[hc('Nombre y Apellido',WN),hc('N° de empleado',WL),...dias5.map(d=>new TableCell({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:DIAS[d.date.getDay()]+'…'+d.date.getDate(),bold:true,color:'FFFFFF',font:'Arial',size:16})]})],shading:{fill:VERDE,type:ShadingType.CLEAR},borders:B,verticalAlign:VerticalAlign.CENTER,columnSpan:2,margins:{top:60,bottom:60,left:60,right:60},width:{size:WD,type:WidthType.DXA}}))];
    const f2=[tc('',WN),tc('',WL),...dias5.flatMap(()=>[new TableCell({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:'HS ENTRADA',bold:true,font:'Arial',size:16})]})],shading:{fill:GRIS,type:ShadingType.CLEAR},borders:B,verticalAlign:VerticalAlign.CENTER,margins:{top:40,bottom:40,left:40,right:40},width:{size:WH,type:WidthType.DXA}}),new TableCell({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:'HS SALIDA',bold:true,font:'Arial',size:16})]})],shading:{fill:GRIS,type:ShadingType.CLEAR},borders:B,verticalAlign:VerticalAlign.CENTER,margins:{top:40,bottom:40,left:40,right:40},width:{size:WH,type:WidthType.DXA}})])];
    const f3=[tc('',WN),tc('',WL),...dias5.flatMap(d=>{const a0=d.actos[0];return[tc(a0?a0.ent||'':'',WH),tc(a0?a0.sal||'':'',WH)];})];
    const f4=[
      new TableCell({children:[new Paragraph({alignment:AlignmentType.LEFT,children:[new TextRun({text:perfil.nombre,bold:true,font:'Arial',size:18})]})],borders:B,verticalAlign:VerticalAlign.CENTER,margins:{top:60,bottom:60,left:80,right:80},width:{size:WN,type:WidthType.DXA}}),
      new TableCell({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:perfil.legajo,bold:true,font:'Arial',size:18})]})],borders:B,verticalAlign:VerticalAlign.CENTER,margins:{top:60,bottom:60,left:60,right:60},width:{size:WL,type:WidthType.DXA}}),
      ...dias5.map(d=>{
        const lines=[];
        if(!d.actos.length){lines.push(new Paragraph({children:[]}));}
        else{
          const a0=d.actos[0];
          lines.push(new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:a0.mod+'.',bold:true,font:'Arial',size:17})]}));
          // Institución (sin distrito)
          if(a0.inst){
            // Strip "— LOCALIDAD" part if came from selector, only show school name
            const instDisplay = a0.inst.includes(' — ') ? a0.inst.split(' — ')[0] : a0.inst;
            lines.push(new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:instDisplay,bold:true,font:'Arial',size:17})]}));

            });

    children.push(new Table({width:{size:TOTAL,type:WidthType.DXA},columnWidths:[WN,WL,WH,WH,WH,WH,WH,WH,WH,WH,WH,WH],rows:[new TableRow({children:f1,tableHeader:true}),new TableRow({children:f2}),new TableRow({children:f3}),new TableRow({children:f4})]}));
  });

  const docdx=new Document({sections:[{properties:{page:{size:{width:16838,height:11906},margin:{top:720,right:720,bottom:720,left:720}}},children}]});
  const buf=await Packer.toBlob(docdx);
  descargarBlob(buf, 'planilla_'+perfil.mes.toLowerCase()+'_'+perfil.anio+'.docx');
  URL.revokeObjectURL(a.href);
  toast('✓ Planilla Word descargada');
}

function dl(content,type,name){
  const b=new Blob([content],{type});
  descargarBlob(b,name);
}

function descargarBlob(blob, name){
  // Intentar con navigator.share (Web Share API — funciona en Android Chrome)
  if(navigator.canShare && navigator.canShare({files:[new File([blob],name,{type:blob.type})]})){
    navigator.share({
      files:[new File([blob],name,{type:blob.type})],
      title:name
    }).catch(()=>descargarFallback(blob,name));
    return;
  }
  descargarFallback(blob,name);
}

function descargarFallback(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=name;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },300);
}

// ── EXPORT PDF ────────────────────────────────────────────────────────────────
function exportPDF(){
  if(!acts.length){toast('No hay actividades');return;}
  toast('Generando PDF…');

  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });

  const byF={};
  acts.forEach(a=>{if(!byF[a.fecha])byF[a.fecha]=[];byF[a.fecha].push(a);});
  const sems=getSemanas(byF);
  const DIAS=['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];

  // Colors
  const AZUL=[43,62,76], BEIGE=[252,242,220], GRIS=[217,217,217], LIMA=[135,184,103];

  let yBase=10;

  // Header
  doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.setTextColor(...AZUL);
  doc.text('Ministerio de Educación del Neuquén: Dirección General de Innovación y Contenidos Digitales.', 148.5, yBase, {align:'center'});
  yBase+=5;
  doc.text('Planilla de Asistencia '+perfil.anio+' - MES: '+perfil.mes.toUpperCase(), 148.5, yBase, {align:'center'});
  yBase+=6;

  sems.forEach((sem,si)=>{
    if(si>0) yBase+=4;

    // Sem label
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.setTextColor(...LIMA);
    doc.text('SEMANA '+(si+1), 14, yBase);
    yBase+=3;

    const lu=new Date(sem[0].date);
    lu.setDate(sem[0].date.getDate()-((sem[0].date.getDay()+6)%7));
    const dias5=[];
    for(let i=0;i<5;i++){
      const d=new Date(lu);d.setDate(lu.getDate()+i);
      const k=d.toISOString().split('T')[0];
      dias5.push({date:d,key:k,actos:byF[k]||[]});
    }

    // Layout
    const pageW=297, mL=14, mR=14;
    const usable=pageW-mL-mR; // 269
    const wNombre=52, wLegajo=20, wDia=(usable-wNombre-wLegajo)/5; // ~39.4
    const wH=wDia/2;

    // Row 1: headers dias
    let x=mL;
    doc.setFillColor(...AZUL); doc.setTextColor(...BEIGE);
    doc.rect(x,yBase,wNombre,7,'F'); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text('Nombre y Apellido',x+wNombre/2,yBase+4.5,{align:'center'});
    x+=wNombre;
    doc.rect(x,yBase,wLegajo,7,'F');
    doc.text('N° Emp.',x+wLegajo/2,yBase+4.5,{align:'center'});
    x+=wLegajo;
    dias5.forEach(d=>{
      doc.rect(x,yBase,wDia,7,'F');
      doc.text(DIAS[d.date.getDay()]+' '+d.date.getDate(), x+wDia/2, yBase+4.5,{align:'center'});
      x+=wDia;
    });
    // borders row1
    doc.setDrawColor(0); doc.setLineWidth(0.3);
    doc.rect(mL,yBase,usable,7,'S');
    let bx=mL+wNombre; doc.line(bx,yBase,bx,yBase+7); bx+=wLegajo; doc.line(bx,yBase,bx,yBase+7);
    dias5.forEach((_,i)=>{ bx+=wDia; if(i<4) doc.line(bx,yBase,bx,yBase+7); });
    yBase+=7;

    // Row 2: HS ENTRADA / HS SALIDA
    x=mL;
    doc.setFillColor(255,255,255); doc.rect(x,yBase,wNombre,5,'F'); x+=wNombre;
    doc.rect(x,yBase,wLegajo,5,'F'); x+=wLegajo;
    dias5.forEach(()=>{
      doc.setFillColor(...GRIS);
      doc.rect(x,yBase,wH,5,'F'); doc.setTextColor(0,0,0); doc.setFontSize(6);
      doc.text('HS ENT.',x+wH/2,yBase+3.2,{align:'center'}); x+=wH;
      doc.rect(x,yBase,wH,5,'F');
      doc.text('HS SAL.',x+wH/2,yBase+3.2,{align:'center'}); x+=wH;
    });
    doc.setDrawColor(0); doc.rect(mL,yBase,usable,5,'S');
    bx=mL+wNombre; doc.line(bx,yBase,bx,yBase+5); bx+=wLegajo; doc.line(bx,yBase,bx,yBase+5);
    let bx2=mL+wNombre+wLegajo;
    for(let i=0;i<5;i++){ bx2+=wH; doc.line(bx2,yBase,bx2,yBase+5); bx2+=wH; if(i<4) doc.line(bx2,yBase,bx2,yBase+5); }
    yBase+=5;

    // Row 3: horas
    x=mL; doc.setFillColor(255,255,255);
    doc.rect(x,yBase,wNombre,5,'F'); x+=wNombre;
    doc.rect(x,yBase,wLegajo,5,'F'); x+=wLegajo;
    doc.setTextColor(0,0,0); doc.setFontSize(7); doc.setFont('helvetica','normal');
    dias5.forEach(d=>{
      const a0=d.actos[0];
      doc.rect(x,yBase,wH,5,'F');
      if(a0&&a0.ent) doc.text(a0.ent,x+wH/2,yBase+3.2,{align:'center'});
      x+=wH;
      doc.rect(x,yBase,wH,5,'F');
      if(a0&&a0.sal) doc.text(a0.sal,x+wH/2,yBase+3.2,{align:'center'});
      x+=wH;
    });
    doc.setDrawColor(0); doc.rect(mL,yBase,usable,5,'S');
    bx=mL+wNombre; doc.line(bx,yBase,bx,yBase+5); bx+=wLegajo; doc.line(bx,yBase,bx,yBase+5);
    bx2=mL+wNombre+wLegajo;
    for(let i=0;i<5;i++){ bx2+=wH; doc.line(bx2,yBase,bx2,yBase+5); bx2+=wH; if(i<4) doc.line(bx2,yBase,bx2,yBase+5); }
    yBase+=5;

    // Row 4: contenido — altura dinámica
    const maxLines = dias5.reduce((max,d)=>{
      if(!d.actos.length) return max;
      let lines=1; // modalidad
      const a0=d.actos[0];
      if(a0.inst) lines++;
      d.actos.forEach(a=>{ lines+=(a.tec||[]).length+(a.ped||[]).length; if(a.obs) lines++; });
      return Math.max(max,lines);
    },2);
    const rowH=Math.max(18, maxLines*4+4);

    x=mL; doc.setFillColor(255,255,255);
    // Nombre
    doc.rect(x,yBase,wNombre,rowH,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...AZUL);
    doc.text(perfil.nombre, x+2, yBase+5, {maxWidth:wNombre-4});
    x+=wNombre;
    // Legajo
    doc.rect(x,yBase,wLegajo,rowH,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(0,0,0);
    doc.text(perfil.legajo, x+wLegajo/2, yBase+5, {align:'center'});
    x+=wLegajo;
    // Días
    dias5.forEach(d=>{
      doc.rect(x,yBase,wDia,rowH,'F');
      if(d.actos.length){
        let ly=yBase+4;
        const a0=d.actos[0];
        doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(0,0,0);
        doc.text(a0.mod+'.', x+wDia/2, ly, {align:'center'}); ly+=3.5;
        if(a0.inst){
          const instD=a0.inst.includes(' — ')?a0.inst.split(' — ')[0]:a0.inst;
          const instLines=doc.splitTextToSize(instD, wDia-2);
          doc.setFont('helvetica','bold'); doc.setFontSize(6);
          instLines.slice(0,2).forEach(l=>{ doc.text(l,x+wDia/2,ly,{align:'center'}); ly+=3; });
        }
        d.actos.forEach(a=>{
          [...(a.tec||[]),...(a.ped||[])].forEach(acc=>{
            doc.setFont('helvetica','normal'); doc.setFontSize(6);
            const ls=doc.splitTextToSize(acc,wDia-2);
            ls.slice(0,2).forEach(l=>{ if(ly<yBase+rowH-2){ doc.text(l,x+wDia/2,ly,{align:'center'}); ly+=3; }});
          });
          if(a.obs&&ly<yBase+rowH-2){
            doc.setTextColor(80,80,80);
            doc.text(a.obs,x+wDia/2,ly,{align:'center'}); ly+=3;
            doc.setTextColor(0,0,0);
          }
        });
      }
      x+=wDia;
    });
    // Borders row4
    doc.setDrawColor(0); doc.rect(mL,yBase,usable,rowH,'S');
    bx=mL+wNombre; doc.line(bx,yBase,bx,yBase+rowH); bx+=wLegajo; doc.line(bx,yBase,bx,yBase+rowH);
    bx2=mL+wNombre+wLegajo;
    for(let i=0;i<4;i++){ bx2+=wDia; doc.line(bx2,yBase,bx2,yBase+rowH); }
    yBase+=rowH;
  });

  const pdfBlob = doc.output('blob');
  descargarBlob(pdfBlob, 'planilla_'+perfil.mes.toLowerCase()+'_'+perfil.anio+'.pdf');
  toast('✓ PDF descargado');
}

// ── COMPARTIR ─────────────────────────────────────────────────────────────────
async function compartir(tipo){
  if(!acts.length){toast('No hay actividades');return;}
  toast('Preparando archivo…');

  const nombre='planilla_'+perfil.mes.toLowerCase()+'_'+perfil.anio;
  let blob, fileName, mimeType;

  try {
    if(tipo==='csv'){
      const rows=[
        ['Ministerio de Educación del Neuquén - DGIyCD'],
        ['Planilla de Asistencia '+perfil.anio+' - MES: '+perfil.mes.toUpperCase()],
        ['Nombre y Apellido',perfil.nombre],['N° de Empleado',perfil.legajo],[],
        ['Fecha','Día','Categoría','Acción','Modalidad','Institución','Hs. Entrada','Hs. Salida','Observaciones']
      ];
      [...acts].sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(a=>{
        [...(a.tec||[]).map(x=>['Técnica',x]),...(a.ped||[]).map(x=>['Pedagógica',x])].forEach(([cat,acc])=>{
          rows.push([a.fecha,fmtFecha(a.fecha),cat,acc,a.mod,a.inst||'',a.ent||'',a.sal||'',a.obs||'']);
        });
      });
      const csv=rows.map(r=>r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
      blob=new Blob(['\uFEFF'+csv],{type:'text/csv'});
      fileName=nombre+'.csv'; mimeType='text/csv';

    } else if(tipo==='docx'){
      // Reuse exportDOCX logic but return blob
      blob = await generarDOCXBlob();
      fileName=nombre+'.docx';
      mimeType='application/vnd.openxmlformats-officedocument.wordprocessingml.document';

    } else if(tipo==='pdf'){
      blob = await generarPDFBlob();
      fileName=nombre+'.pdf'; mimeType='application/pdf';
    }

    const file = new File([blob], fileName, {type: mimeType});

    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        files:[file],
        title:'Planilla '+perfil.mes+' '+perfil.anio,
        text:'Planilla de Asistencia - '+perfil.nombre
      });
      toast('✓ Compartido');
    } else {
      // Fallback: descarga directa
      descargarFallback(blob, fileName);
      toast('✓ Archivo descargado');
    }
  } catch(e){
    if(e.name!=='AbortError') toast('Error: '+e.message);
  }
}

      let x=mL;
      doc.setFillColor(...AZUL);doc.setTextColor(...BEIGE);
      doc.rect(x,yBase,wNombre,7,'F');doc.setFontSize(7);doc.setFont('helvetica','bold');
      doc.text('Nombre y Apellido',x+wNombre/2,yBase+4.5,{align:'center'});x+=wNombre;
      doc.rect(x,yBase,wLegajo,7,'F');doc.text('N° Emp.',x+wLegajo/2,yBase+4.5,{align:'center'});x+=wLegajo;
      dias5.forEach(d=>{doc.rect(x,yBase,wDia,7,'F');doc.text(DIAS[d.date.getDay()]+' '+d.date.getDate(),x+wDia/2,yBase+4.5,{align:'center'});x+=wDia;});
      doc.setDrawColor(0);doc.setLineWidth(0.3);doc.rect(mL,yBase,usable,7,'S');
      let bx=mL+wNombre;doc.line(bx,yBase,bx,yBase+7);bx+=wLegajo;doc.line(bx,yBase,bx,yBase+7);
      dias5.forEach((_,i)=>{bx+=wDia;if(i<4)doc.line(bx,yBase,bx,yBase+7);});yBase+=7;
      x=mL;doc.setFillColor(255,255,255);doc.rect(x,yBase,wNombre,5,'F');x+=wNombre;doc.rect(x,yBase,wLegajo,5,'F');x+=wLegajo;
      dias5.forEach(()=>{doc.setFillColor(...GRIS);doc.rect(x,yBase,wH,5,'F');doc.setTextColor(0,0,0);doc.setFontSize(6);doc.text('HS ENT.',x+wH/2,yBase+3.2,{align:'center'});x+=wH;doc.rect(x,yBase,wH,5,'F');doc.text('HS SAL.',x+wH/2,yBase+3.2,{align:'center'});x+=wH;});
      doc.setDrawColor(0);doc.rect(mL,yBase,usable,5,'S');
      bx=mL+wNombre;doc.line(bx,yBase,bx,yBase+5);bx+=wLegajo;doc.line(bx,yBase,bx,yBase+5);
      let bx2=mL+wNombre+wLegajo;for(let i=0;i<5;i++){bx2+=wH;doc.line(bx2,yBase,bx2,yBase+5);bx2+=wH;if(i<4)doc.line(bx2,yBase,bx2,yBase+5);}yBase+=5;
      x=mL;doc.setFillColor(255,255,255);doc.rect(x,yBase,wNombre,5,'F');x+=wNombre;doc.rect(x,yBase,wLegajo,5,'F');x+=wLegajo;
      doc.setTextColor(0,0,0);doc.setFontSize(7);doc.setFont('helvetica','normal');
      dias5.forEach(d=>{const a0=d.actos[0];doc.rect(x,yBase,wH,5,'F');if(a0&&a0.ent)doc.text(a0.ent,x+wH/2,yBase+3.2,{align:'center'});x+=wH;doc.rect(x,yBase,wH,5,'F');if(a0&&a0.sal)doc.text(a0.sal,x+wH/2,yBase+3.2,{align:'center'});x+=wH;});
      doc.setDrawColor(0);doc.rect(mL,yBase,usable,5,'S');
      bx=mL+wNombre;doc.line(bx,yBase,bx,yBase+5);bx+=wLegajo;doc.line(bx,yBase,bx,yBase+5);
      bx2=mL+wNombre+wLegajo;for(let i=0;i<5;i++){bx2+=wH;doc.line(bx2,yBase,bx2,yBase+5);bx2+=wH;if(i<4)doc.line(bx2,yBase,bx2,yBase+5);}yBase+=5;
      const maxLines=dias5.reduce((max,d)=>{if(!d.actos.length)return max;let lines=1;const a0=d.actos[0];if(a0.inst)lines++;d.actos.forEach(a=>{lines+=(a.tec||[]).length+(a.ped||[]).length;if(a.obs)lines++;});return Math.max(max,lines);},2);
      const rowH=Math.max(18,maxLines*4+4);
      x=mL;doc.setFillColor(255,255,255);
      doc.rect(x,yBase,wNombre,rowH,'F');doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(...AZUL);
      doc.text(perfil.nombre,x+2,yBase+5,{maxWidth:wNombre-4});x+=wNombre;
      doc.rect(x,yBase,wLegajo,rowH,'F');doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(0,0,0);
      doc.text(perfil.legajo,x+wLegajo/2,yBase+5,{align:'center'});x+=wLegajo;
      dias5.forEach(d=>{
        doc.rect(x,yBase,wDia,rowH,'F');
        if(d.actos.length){let ly=yBase+4;const a0=d.actos[0];doc.setFont('helvetica','bold');doc.setFontSize(6.5);doc.setTextColor(0,0,0);doc.text(a0.mod+'.',x+wDia/2,ly,{align:'center'});ly+=3.5;
          if(a0.inst){const instD=a0.inst.includes(' — ')?a0.inst.split(' — ')[0]:a0.inst;const il=doc.splitTextToSize(instD,wDia-2);doc.setFont('helvetica','bold');doc.setFontSize(6);il.slice(0,2).forEach(l=>{doc.text(l,x+wDia/2,ly,{align:'center'});ly+=3;});}
          d.actos.forEach(a=>{[...(a.tec||[]),...(a.ped||[])].forEach(acc=>{doc.setFont('helvetica','normal');doc.setFontSize(6);const ls=doc.splitTextToSize(acc,wDia-2);ls.slice(0,2).forEach(l=>{if(ly<yBase+rowH-2){doc.text(l,x+wDia/2,ly,{align:'center'});ly+=3;}});});if(a.obs&&ly<yBase+rowH-2){doc.setTextColor(80,80,80);doc.text(a.obs,x+wDia/2,ly,{align:'center'});ly+=3;doc.setTextColor(0,0,0);}});}
        x+=wDia;
      });
      doc.setDrawColor(0);doc.rect(mL,yBase,usable,rowH,'S');
      bx=mL+wNombre;doc.line(bx,yBase,bx,yBase+rowH);bx+=wLegajo;doc.line(bx,yBase,bx,yBase+rowH);
      bx2=mL+wNombre+wLegajo;for(let i=0;i<4;i++){bx2+=wDia;doc.line(bx2,yBase,bx2,yBase+rowH);}
      yBase+=rowH;
    });
    resolve(doc.output('blob'));
  });
}

async function generarDOCXBlob(){
  // Same as exportDOCX but returns blob instead of downloading
  const {Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,AlignmentType,WidthType,BorderStyle,ShadingType,VerticalAlign}=docx;
  const VERDE='1E4D3B',GRIS='D9D9D9';
  function brd(c='000000',s=4){return{style:BorderStyle.SINGLE,size:s,color:c};}
  const B={top:brd(),bottom:brd(),left:brd(),right:brd()};
  const WN=2200,WL=1200,WH=562,WD=WH*2,TOTAL=WN+WL+WD*5;
  const DIAS=['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
  function hc(txt,w,bg=VERDE,fg='FFFFFF'){return new TableCell({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:txt,bold:true,color:fg,font:'Arial',size:16})]})],shading:{fill:bg,type:ShadingType.CLEAR},borders:B,verticalAlign:VerticalAlign.CENTER,margins:{top:60,bottom:60,left:60,right:60},width:{size:w,type:WidthType.DXA}});}
  function tc(txt,w){return new TableCell({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:String(txt||''),font:'Arial',size:18})]})],borders:B,verticalAlign:VerticalAlign.CENTER,margins:{top:60,bottom:60,left:80,right:80},width:{size:w,type:WidthType.DXA}});}
  const byF={};acts.forEach(a=>{if(!byF[a.fecha])byF[a.fecha]=[];byF[a.fecha].push(a);});
  const sems=getSemanas(byF);
  const children=[
    new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:80},children:[new TextRun({text:'Ministerio de Educación del Neuquén: Dirección General de Innovación y Contenidos Digitales.',bold:true,font:'Arial',size:22})]}),
    new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:200},children:[new TextRun({text:'Planilla de Asistencia '+perfil.anio+' - MES: '+perfil.mes.toUpperCase(),bold:true,font:'Arial',size:22})]}),
  ];
  sems.forEach((sem,si)=>{
    if(si>0)children.push(new Paragraph({spacing:{before:300},children:[]}));
    const lu=new Date(sem[0].date);lu.setDate(sem[0].date.getDate()-((sem[0].date.getDay()+6)%7));
    const dias5=[];for(let i=0;i<5;i++){const d=new Date(lu);d.setDate(lu.getDate()+i);const k=d.toISOString().split('T')[0];dias5.push({date:d,key:k,actos:byF[k]||[]});}
    const f1=[hc('Nombre y Apellido',WN),hc('N° de empleado',WL),...dias5.map(d=>new TableCell({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:DIAS[d.date.getDay()]+'…'+d.date.getDate(),bold:true,color:'FFFFFF',font:'Arial',size:16})]})],shading:{fill:VERDE,type:ShadingType.CLEAR},borders:B,verticalAlign:VerticalAlign.CENTER,columnSpan:2,margins:{top:60,bottom:60,left:60,right:60},width:{size:WD,type:WidthType.DXA}}))];
    const f2=[tc('',WN),tc('',WL),...dias5.flatMap(()=>[new TableCell({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:'HS ENTRADA',bold:true,font:'Arial',size:16})]})],shading:{fill:GRIS,type:ShadingType.CLEAR},borders:B,verticalAlign:VerticalAlign.CENTER,margins:{top:40,bottom:40,left:40,right:40},width:{size:WH,type:WidthType.DXA}}),new TableCell({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:'HS SALIDA',bold:true,font:'Arial',size:16})]})],shading:{fill:GRIS,type:ShadingType.CLEAR},borders:B,verticalAlign:VerticalAlign.CENTER,margins:{top:40,bottom:40,left:40,right:40},width:{size:WH,type:WidthType.DXA}})])];
    const f3=[tc('',WN),tc('',WL),...dias5.flatMap(d=>{const a0=d.actos[0];return[tc(a0?a0.ent||'':'',WH),tc(a0?a0.sal||'':'',WH)];})];
    const f4=[new TableCell({children:[new Paragraph({alignment:AlignmentType.LEFT,children:[new TextRun({text:perfil.nombre,bold:true,font:'Arial',size:18})]})],borders:B,verticalAlign:VerticalAlign.CENTER,margins:{top:60,bottom:60,left:80,right:80},width:{size:WN,type:WidthType.DXA}}),new TableCell({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:perfil.legajo,bold:true,font:'Arial',size:18})]})],borders:B,verticalAlign:VerticalAlign.CENTER,margins:{top:60,bottom:60,left:60,right:60},width:{size:WL,type:WidthType.DXA}}),...dias5.map(d=>{const lines=[];if(!d.actos.length){lines.push(new Paragraph({children:[]}));}else{const a0=d.actos[0];lines.push(new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:a0.mod+'.',bold:true,font:'Arial',size:17})]}));if(a0.inst){const instDisplay=a0.inst.includes(' — ')?a0.inst.split(' — ')[0]:a0.inst;lines.push(new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:instDisplay,bold:true,font:'Arial',size:17})]}));}d.actos.forEach(a=>{[...(a.tec||[]),...(a.ped||[])].forEach(acc=>{lines.push(new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:acc,bold:true,font:'Arial',size:17})]})});if(a.obs)lines.push(new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:a.obs,font:'Arial',size:16})]}))})}return new TableCell({children:lines,borders:B,verticalAlign:VerticalAlign.TOP,margins:{top:60,bottom:60,left:80,right:80},columnSpan:2,width:{size:WD,type:WidthType.DXA}});})];
    children.push(new Table({width:{size:TOTAL,type:WidthType.DXA},columnWidths:[WN,WL,WH,WH,WH,WH,WH,WH,WH,WH,WH,WH],rows:[new TableRow({children:f1,tableHeader:true}),new TableRow({children:f2}),new TableRow({children:f3}),new TableRow({children:f4})]}));
  });
  const docdx=new Document({sections:[{properties:{page:{size:{width:16838,height:11906},margin:{top:720,right:720,bottom:720,left:720}}},children}]});
  return Packer.toBlob(docdx);
}


function enviarMail(){
  if(!acts.length){toast('No hay actividades para enviar');return;}
  if(!perfil.email){toast('Configurá el email destinatario primero');return;}

  // Armar asunto y cuerpo
  const asunto=encodeURIComponent('Planilla de Asistencia '+perfil.mes+' '+perfil.anio+' - '+perfil.nombre);
  const cuerpo=encodeURIComponent(
    'Buenos días,\n\n' +
    'Adjunto la planilla de asistencia correspondiente al mes de '+perfil.mes+' '+perfil.anio+'.\n\n' +
    'Empleado: '+perfil.nombre+'\n' +
    'N° de empleado: '+perfil.legajo+'\n' +
    'Actividades registradas: '+acts.length+'\n\n' +
    'Saludos,\n'+perfil.nombre+'\n\n' +
    '---\n' +
    'Nota: Este mail fue generado desde la app DGIyCD.\n' +
    'Para adjuntar la planilla, exportá el PDF o Word y adjuntalo manualmente.'
  );

  let mailto = 'mailto:'+perfil.email+'?subject='+asunto+'&body='+cuerpo;
  if(perfil.emailcc) mailto += '&cc='+encodeURIComponent(perfil.emailcc);

  window.open(mailto,'_blank');
  toast('Abriendo cliente de mail…');
}

function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
